kind = "web"
previewPath = "/"
title = "Office Attendance Tracker"
version = "1.0.0"
id = "artifacts/office-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21374

[services.development]
run = "pnpm --filter @workspace/office-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/office-tracker", "run", "build" ]
publicDir = "artifacts/office-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21374"
BASE_PATH = "/"
